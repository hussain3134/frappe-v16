x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-ghcr.io/hussain3134/frappe-v16}:${CUSTOM_TAG:-version-16}
  platform: linux/amd64
  pull_policy: ${PULL_POLICY:-always}
  restart: ${RESTART_POLICY:-unless-stopped}

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *customizable_image]
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs
  networks:
    - frappe_network

services:
  configurator:
    <<: *backend_defaults
    entrypoint:
      - bash
      - -c
    # add redis_socketio for backward compatibility
    command:
      - >
        [[ $${REGENERATE_APPS_TXT} == "1" ]] && ls -1 apps > sites/apps.txt;
        [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && exit 0;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
      SOCKETIO_PORT: 9000
      REGENERATE_APPS_TXT: "${REGENERATE_APPS_TXT:-0}"
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: on-failure

  migration:
    <<: *backend_defaults
    deploy:
      mode: replicated
      replicas: ${MIGRATE:-0}
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        curl -f http://${SITE_NAME}:8080/api/method/ping || echo "Site busy" && exit 0;
        bench --site all set-config -p maintenance_mode 1;
        bench --site all set-config -p pause_scheduler 1;
        bench --site all migrate;
        bench --site all set-config -p maintenance_mode 0;
        bench --site all set-config -p pause_scheduler 0;

  backend:
    <<: *backend_defaults
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - "127.0.0.1:8000"
      interval: 2s
      timeout: 10s
      retries: 30

  frontend:
    <<: *customizable_image
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - frappe_network
    depends_on:
      - backend
      - websocket
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - "127.0.0.1:8080"
      interval: 2s
      timeout: 30s
      retries: 30

  websocket:
    <<: *backend_defaults
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - "127.0.0.1:9000"
      interval: 2s
      timeout: 10s
      retries: 30
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js

  queue-default:
    <<: *backend_defaults
    command: bench worker --queue default
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - "redis-queue:6379"
      interval: 2s
      timeout: 10s
      retries: 30
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    <<: *backend_defaults
    command: bench worker --queue short
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - "redis-queue:6379"
      interval: 2s
      timeout: 10s
      retries: 30
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-long:
    <<: *backend_defaults
    command: bench worker --queue long
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - "redis-queue:6379"
      interval: 2s
      timeout: 10s
      retries: 30
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  scheduler:
    <<: *backend_defaults
    command: bench schedule
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - "redis-queue:6379"
      interval: 2s
      timeout: 10s
      retries: 30

  create-site:
    <<: *backend_defaults
    deploy:
      mode: replicated
      replicas: ${CREATE_SITE:-0}
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 180 $$DB_HOST:$$DB_PORT;
        wait-for-it -t 180 redis-cache:6379;
        wait-for-it -t 180 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created...";
          sleep 5;
          if (( `date +%s`-start > 180 )); then
            echo "Timed out waiting for sites/common_site_config.json";
            exit 1;
          fi
        done;
        echo "Could not find sites/common_site_config.json";
        [[ -d "sites/$${SITE_NAME}" ]] && echo "Site $${SITE_NAME} already exists" && exit 0;
        bench new-site \
          --mariadb-user-host-login-scope='%' \
          --admin-password=$${ADMIN_PASSWORD} \
          --db-root-username=root \
          --db-root-password=$${DB_ROOT_PASSWORD} \
          $${INSTALL_APP_ARGS} \
          $${SITE_NAME};
    environment:
      SITE_NAME: ${SITE_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      INSTALL_APP_ARGS: ${INSTALL_APP_ARGS:---install-app erpnext}

  db:
    image: mariadb:11.8
    deploy:
      mode: replicated
      replicas: ${ENABLE_DB:-0}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed # Temporary fix for MariaDB 10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-123}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-123}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - frappe_network

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data
    networks:
      - frappe_network
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 3

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    networks:
      - frappe_network
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 3

  redis-socketio:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-socketio-data:/data
    networks:
      - frappe_network
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 3

# ERPNext requires local assets access (Frappe does not)
volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:
  sites:
    driver_opts:
      type: "${SITE_VOLUME_TYPE}"
      o: "${SITE_VOLUME_OPTS}"
      device: "${SITE_VOLUME_DEV}"
  logs:

networks:
  frappe_network:
    driver: bridge
