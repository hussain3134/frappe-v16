[variables]
main_domain = "${domain}"
db_root_password = "${password:32}"
admin_password = "${password:32}"

[config]
env = [
  # Site bootstrap
  "SITE_NAME=${main_domain}",
  "ADMIN_PASSWORD=${admin_password}",
  "DB_ROOT_PASSWORD=${db_root_password}",

  # One-time jobs
  "CREATE_SITE=1",
  "CONFIGURE=1",
  "MIGRATE=1",

  # Enable internal DB container
  "ENABLE_DB=1",
  "DB_HOST=db",
  "DB_PORT=3306",

  # Redis (internal containers)
  "REDIS_CACHE=redis-cache:6379",
  "REDIS_QUEUE=redis-queue:6379",

  # Install Apps
  "REGENERATE_APPS_TXT=1",
  "INSTALL_APP_ARGS=--install-app erpnext --install-app crm --install-app hrms --install-app ecommerce_integrations --install-app india_compliance",

  # Image selection
  "CUSTOM_IMAGE=ghcr.io/hussain3134/frappe-v16",
  "CUSTOM_TAG=version-16",
  "PULL_POLICY=always",

  # CRITICAL: do not leave this blank on v16
  "FRAPPE_SITE_NAME_HEADER=",
]
mounts = []

[[config.domains]]
serviceName = "frontend"
port = 8_080
host = "${main_domain}"
