name: Production Build & Deploy

on:
  push:
    branches: [ main ]
    paths:
      - versions.lock.json

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/frappe-v16

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate apps.json
        run: python .github/scripts/render_apps_json.py

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: frappe_docker/images/custom/Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v16-latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}

      - name: Trigger Dokploy Deploy
        run: curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"

