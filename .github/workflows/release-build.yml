name: Release Build

on:
  push:
    branches: [ main ]
    paths:
      - versions.lock.json
      
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/frappe-v16

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v5

      - name: Checkout frappe_docker
        uses: actions/checkout@v5
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate APPS_JSON_BASE64
        run: python .github/scripts/render_apps_json.py

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: frappe_docker/images/layered/Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:version-16
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
